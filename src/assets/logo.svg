<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <!-- Background Gradient: Blue (C++) to Yellow (Python) -->
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#004e92" />
      <stop offset="40%" stop-color="#0072ff" />
      <stop offset="60%" stop-color="#fcd34d" />
      <stop offset="100%" stop-color="#f59e0b" />
    </linearGradient>

    <!-- Drop Shadow for the letter Z -->
    <filter id="drop-shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="12" stdDeviation="16" flood-color="#000000" flood-opacity="0.35" />
    </filter>

    <!-- Subtle Inner Bevel/Glow for premium look -->
    <linearGradient id="border-grad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.4" />
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0.05" />
    </linearGradient>
  </defs>

  <!-- Main Background Squircle -->
  <rect width="512" height="512" rx="128" fill="url(#bg-grad)" />

  <!-- Premium Inner Border -->
  <rect x="12" y="12" width="488" height="488" rx="116" fill="none" stroke="url(#border-grad)" stroke-width="6" />

  <!-- Minimalist Letter 'Z' -->
  <path d="M 160 160 H 352 L 160 352 H 352" 
        fill="none" 
        stroke="#ffffff" 
        stroke-width="56" 
        stroke-linecap="round" 
        stroke-linejoin="round" 
        filter="url(#drop-shadow)" />
        
  <!-- Subtle glassmorphic reflection overlay -->
  <path d="M 12 12 H 500 V 220 C 350 200, 162 260, 12 150 Z" 
        fill="#ffffff" 
        opacity="0.06" />
</svg>
